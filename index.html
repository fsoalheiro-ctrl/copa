  .sub{font-size:clamp(15px,4vw,26px);font-weight:400;line-height:1.4;color:rgba(249,249,249,.82);

  .cta{margin-top:clamp(24px,5vw,40px);display:flex;align-items:center;gap:clamp(16px,4vw,28px);flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;gap:12px;background:var(--sg);color:var(--ln);text-decoration:none;
